# Flight-booking LIVE demo — every Run click triggers a fresh `claude -p` call
# per agent per tick. Sized so a full run completes in ~60-90 seconds.
#
# Bigger than 6 buyers x 4 ticks and OAuth rate-limiting on the Claude CLI
# starts serialising the parallel workers, blowing past the demo time budget.

config_version: 1

global_defaults:
  one_item_type: true
  llm_name: claude-haiku-4-5
  max_messages_per_round: 3
  price_tick: 1
  transaction_rule: seller_accepts_offer

archetypes:
  sellers:
    anchoring_negotiator: >
      Starts high, makes slow concessions.
    clearance_specialist: >
      Steadily lowers prices to clear inventory.

  buyers:
    patient_value_buyer: >
      Waits for attractive prices. Hates overpaying.
    must_have_buyer: >
      Needs the unit; becomes more flexible as deadline nears.
    arbitrage_buyer: >
      Hunts unusually favourable prices. Info-hungry, may bluff.
    contrarian_buyer: >
      Avoids consensus. Patient, opportunistic.

simulations:
  - id: flight_booking_live
    summary: >
      Live LLM demo. 6 buyers, 2 airlines, 4 ticks. Each tick every active
      buyer makes a real claude -p call, returned response drives behaviour.

    settings:
      max_rounds: 4
      num_sellers: 2
      num_buyers: 6

    market_rules:
      pricing: negotiated
      allow_negotiation: true
      allow_buyer_coalitions: true
      allow_seller_collusion: false
      allow_price_info_sharing: true

    topology:
      input_type: generated
      compile_to: adjacency_matrix
      directed: false
      generator:
        seller_buyer_edges: complete_bipartite
        seller_seller_edges: none
        buyer_buyer_edges:
          type: small_world
          cluster_size: 3
          long_range_edges: 2

    sellers:
      - id: Airline_A
        archetype: anchoring_negotiator
        inventory: 3
        starting_price: 364
        min_price: 182
        goal: { type: highest_revenue }

      - id: Airline_B
        archetype: clearance_specialist
        inventory: 2
        starting_price: 338
        min_price: 169
        goal: { type: sell_all }

    buyers:
      - { id: buyer_1, archetype: patient_value_buyer, budget: 320,
          goal: { type: buy_if_below_price, max_price_per_item: 280, max_quantity: 1 } }
      - { id: buyer_2, archetype: patient_value_buyer, budget: 340,
          goal: { type: buy_if_below_price, max_price_per_item: 295, max_quantity: 1 } }
      - { id: buyer_3, archetype: must_have_buyer, budget: 380,
          goal: { type: must_buy_quantity, quantity: 1, max_price_per_item: 380 } }
      - { id: buyer_4, archetype: must_have_buyer, budget: 395,
          goal: { type: must_buy_quantity, quantity: 1, max_price_per_item: 395 } }
      - { id: buyer_5, archetype: arbitrage_buyer, budget: 350,
          goal: { type: buy_if_below_price, max_price_per_item: 280, max_quantity: 1 } }
      - { id: buyer_6, archetype: contrarian_buyer, budget: 310,
          goal: { type: buy_if_below_price, max_price_per_item: 250, max_quantity: 1 } }

    pricing:
      behind_pace_threshold: 0.15
      ahead_pace_threshold: 0.15
      behind_discount: 0.96
      ahead_raise: 1.04
      endgame_time_left: 0.25
      endgame_discount: 0.92
      demand_pulse_ratio: 0.30
      demand_pulse_raise: 1.03

    llm:
      model: haiku
      timeout_seconds: 60
      cwd: /tmp
      disallowed_tools:
        - Bash
        - Edit
        - Read
        - Write
        - Grep
        - Glob
        - TodoWrite
        - TaskCreate
        - WebFetch
        - WebSearch
        - Task
        - Agent
        - NotebookEdit
        - Skill
