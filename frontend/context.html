<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentArena - Agent Context</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="context">
  <div class="shell">
    <header class="topnav">
      <a class="brand" href="runs.html">
        <strong>AgentArena</strong>
        <span>File-backed LLM market simulations</span>
      </a>
      <nav class="navlinks" aria-label="Primary"></nav>
    </header>

    <main id="context-root">
      <div class="page-head">
        <div class="page-title">
          <h1 id="context-title">Agent Context</h1>
          <p id="context-subtitle">Loading prompt context...</p>
          <div id="context-status" class="status-line">Loading status...</div>
        </div>
        <div class="actions">
          <a id="back-run" class="button" href="runs.html">Run Details</a>
          <a class="button" href="runs.html">Past Runs</a>
        </div>
      </div>

      <div class="context-layout">
        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">Players</div>
          </div>
          <div class="panel-body">
            <div id="agent-nav" class="agent-nav"></div>
          </div>
        </section>

        <section id="selected-agent" class="panel">
          <div class="panel-body">
            <div class="empty">Select an agent to inspect context.</div>
          </div>
        </section>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
