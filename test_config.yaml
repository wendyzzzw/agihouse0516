  - id: model_asymmetry_market
    summary: >
      Buyers run stronger models and richer persuasion personas while sellers
      use a mixed model stack. This tests whether model capability asymmetry
      changes price discovery, coalition formation, and seller revenue.

    settings:
      max_rounds: 7
      num_sellers: 4
      num_buyers: 10
      max_messages_per_round: 4

    market_rules:
      pricing: negotiated
      allow_negotiation: true
      allow_buyer_coalitions: true
      allow_seller_collusion: false
      allow_joint_offers: true
      allow_price_info_sharing: true
      allow_model_asymmetry: true

    model_assignment:
      default: { provider: openai, model: gpt-4.1-mini }
      roles:
        buyer: { provider: openai, model: gpt-5.5 }
      agents:
        seller_1: { provider: claude, model: claude-opus-4.7 }
        seller_2: { provider: openai, model: gpt-4.1-mini }
        seller_3: { provider: claude, model: claude-haiku-4.5 }
        seller_4: { provider: openai, model: gpt-5.5 }

    topology:
      input_type: generated
      compile_to: adjacency_matrix
      generator:
        seller_buyer_edges: complete_bipartite
        seller_seller_edges: none
        buyer_buyer_edges:
