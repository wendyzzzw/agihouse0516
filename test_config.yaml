        goal: { type: buy_if_below_price, max_price_per_item: 90, max_quantity: 2 }

  - id: sparse_local_market
    summary: >
      A fragmented local market. Buyers can only reach nearby sellers, so some
      sellers have local monopoly power while others face competition.

    settings:
      max_rounds: 8
      num_sellers: 5
      num_buyers: 15

    market_rules:
