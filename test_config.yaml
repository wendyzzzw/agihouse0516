        inventory: 5
        starting_price: 105
        min_price: 60
        goal: { type: min_revenue, min_revenue: 400 }

      - id: seller_3
        archetype: market_maker
        inventory: 7
        starting_price: 95
        min_price: 50
        goal: { type: sell_all }

      - id: seller_4
        archetype: defensive_seller
        inventory: 4
        starting_price: 120
        min_price: 70
        goal: { type: highest_revenue }

      - id: seller_5
        archetype: clearance_specialist
        inventory: 6
        starting_price: 90
        min_price: 45
        goal: { type: sell_all }

    buyers:
      - id: buyer_1
        archetype: anxious_buyer
        budget: 220
        goal: { type: must_buy_quantity, quantity: 2, max_price_per_item: 120 }

      - id: buyer_2
        archetype: budget_constrained_buyer
        budget: 120
        goal: { type: buy_if_below_price, max_price_per_item: 65, max_quantity: 1 }

      - id: buyer_3
        archetype: information_broker
        budget: 180
        goal: { type: buy_if_below_price, max_price_per_item: 80, max_quantity: 2 }

      - id: buyer_4
